name: Release S3 Sync Sidecar

on:
  push:
    branches: [main]
    paths:
      - "deploy/s3-sync/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/s3-sync

jobs:
  build-push:
    name: Build & Push s3-sync image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract s5cmd version from Dockerfile
        id: version
        run: |
          VERSION=$(grep -oP 'S5CMD_VERSION=\K[0-9.]+' deploy/s3-sync/Dockerfile)
          echo "s5cmd-version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 s5cmd version: ${VERSION}"

      # ==================== REGISTRY LOGIN ====================
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::578348582779:role/github-actions-ecr-push-mesh
          aws-region: sa-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ==================== BUILD & PUSH ====================
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ steps.ecr-login.outputs.registry }}/deco/s3-sync
          tags: |
            type=raw,value=${{ steps.version.outputs.s5cmd-version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./deploy/s3-sync
          file: ./deploy/s3-sync/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
