name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install nats-server
        run: |
          curl -sL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz -o nats-server.tar.gz
          tar xzf nats-server.tar.gz
          sudo mv nats-server-v2.10.24-linux-amd64/nats-server /usr/local/bin/
          rm -rf nats-server.tar.gz nats-server-v2.10.24-linux-amd64
          nats-server --version

      - name: Install dependencies
        run: bun install

      - name: Run format
        run: bun run fmt:check

      - name: Run lint
        run: bun run lint

      - name: Run check
        run: bun run check:ci

      - name: Run tests
        run: bun run test

      - name: Build server bundle
        run: bun run --cwd=apps/mesh build:server

      - name: Verify bundle outputs
        run: |
          test -f apps/mesh/dist/server/server.js
          test -f apps/mesh/dist/server/migrate.js
          test -f apps/mesh/dist/server/cli.js

      - name: Run knip
        run: bun run knip
