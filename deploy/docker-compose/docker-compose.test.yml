# Test compose for the --num-threads PR on Linux (Docker).
#
# Usage (from repo root):
#   docker compose -f deploy/docker-compose/docker-compose.test.yml up --build
#
# Then: curl http://localhost:3000/health

services:
  postgres:
    image: postgres:15-alpine
    container_name: mesh-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:latest
    container_name: mesh-test-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: -js -n nats-test -m 8222

  mesh:
    build:
      context: ../..
      dockerfile: deploy/docker-compose/Dockerfile.test
    container_name: mesh-test-server
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
      - NATS_URL=nats://nats:4222
      - BASE_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-test-data:
    driver: local
