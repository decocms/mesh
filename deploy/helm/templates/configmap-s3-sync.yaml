{{- if .Values.s3Sync.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-deco-studio.fullname" . }}-s3-sync
  labels:
    {{- include "chart-deco-studio.labels" . | nindent 4 }}
data:
  sync.sh: |
    #!/bin/sh

    BUCKET={{ required "s3Sync.bucket is required when s3Sync.enabled=true" .Values.s3Sync.bucket | quote }}
    REGION={{ .Values.s3Sync.region | quote }}
    PREFIX={{ .Values.s3Sync.prefix | quote }}
    DATA_DIR={{ .Values.configMap.meshConfig.DATA_DIR | default "/app/data" | quote }}
    DIRS={{ join " " .Values.s3Sync.syncDirs | quote }}
    INTERVAL={{ .Values.s3Sync.interval | default 30 }}

    export AWS_DEFAULT_REGION="$REGION"
    export HOME="/tmp"

    # Build S3 base path
    S3_BASE="s3://${BUCKET}"
    if [ -n "$PREFIX" ]; then
      S3_BASE="${S3_BASE}/${PREFIX}"
    fi

    do_sync() {
      for dir in $DIRS; do
        if [ -d "${DATA_DIR}/${dir}" ]; then
          s5cmd --numworkers 1 --log error sync --size-only \
            "${DATA_DIR}/${dir}/" "${S3_BASE}/${dir}/" || echo "s3-sync: error syncing ${dir}"
        fi
      done
    }

    # Final sync on shutdown
    trap 'echo "s3-sync: final sync before exit"; do_sync; exit 0' TERM INT

    echo "s3-sync: starting (polling every ${INTERVAL}s) to ${S3_BASE}"

    while true; do
      do_sync
      sleep "$INTERVAL"
    done
{{- end }}
