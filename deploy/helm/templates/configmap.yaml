apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-deco-studio.fullname" . }}-config
  labels:
    {{- include "chart-deco-studio.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.configMap.meshConfig | nindent 2 }}
  {{- $autoNatsUrl := "" }}
  {{- if .Values.nats.enabled }}
  {{- $autoNatsUrl = printf "nats://%s-nats:4222" .Release.Name }}
  {{- end }}
  {{- $natsUrl := .Values.configMap.meshConfig.NATS_URL | default $autoNatsUrl }}
  {{- if and $natsUrl (not (hasKey .Values.configMap.meshConfig "NATS_URL")) }}
  NATS_URL: {{ $natsUrl | quote }}
  {{- end }}
  {{- if ne (lower (default "sqlite" .Values.database.engine)) "postgresql" }}
  DATABASE_URL: {{ include "chart-deco-studio.databaseUrl" . | trim | quote }}
  {{- end }}
  {{- if .Values.sandbox.kubernetes.enabled }}
  {{- if not (hasKey .Values.configMap.meshConfig "MESH_SANDBOX_RUNNER") }}
  MESH_SANDBOX_RUNNER: "kubernetes"
  {{- end }}
  {{- with .Values.sandbox.kubernetes.previewUrlPattern }}
  MESH_SANDBOX_PREVIEW_URL_PATTERN: {{ . | quote }}
  {{- end }}
  {{- end }}
