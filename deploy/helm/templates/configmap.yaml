apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-decocms.fullname" . }}-config
  labels:
    {{- include "chart-decocms.labels" . | nindent 4 }}
data:
  {{- $knownKeys := list "NODE_EXTRA_CA_CERTS" }}
  {{- range $key, $value := .Values.configMap.meshConfig }}
  {{- if not (has $key $knownKeys) }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.configMap.meshConfig.NODE_EXTRA_CA_CERTS $.Values.database.caCert }}
  NODE_EXTRA_CA_CERTS: {{ .Values.configMap.meshConfig.NODE_EXTRA_CA_CERTS | quote }}
  {{- end }}
  {{- if ne (lower (default "sqlite" .Values.database.engine)) "postgresql" }}
  # DATABASE_URL only goes in ConfigMap when SQLite (file path, not sensitive)
  DATABASE_URL: {{ include "chart-decocms.databaseUrl" . | trim | quote }}
  {{- end }}
