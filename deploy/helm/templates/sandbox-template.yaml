{{- if .Values.sandbox.kubernetes.enabled }}
# Shared SandboxTemplate consumed by every SandboxClaim the mesh runner
# creates. Mirrors deploy/k8s-sandbox/local/sandbox-template.yaml with prod
# ceilings from values.sandbox.kubernetes.resources.
#
# Hardcoded to the operator's own namespace (agent-sandbox-system) — the CRDs
# ship with that as the install target, and the operator's RBAC watches it by
# default.
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: mesh-sandbox
  namespace: agent-sandbox-system
  labels:
    app.kubernetes.io/name: mesh-sandbox
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "chart-deco-studio.chart" . }}
spec:
  # Claims inject DAEMON_TOKEN per-provision (see PLAN-K8S-REMAINING 2.1). The
  # template carries no shared secret; leakage of the template compromises
  # nothing on its own.
  envVarsInjectionPolicy: Allowed
  podTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: mesh-sandbox
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sandbox
          image: "{{ .Values.sandbox.kubernetes.image.repository }}:{{ .Values.sandbox.kubernetes.image.tag }}"
          imagePullPolicy: {{ .Values.sandbox.kubernetes.image.pullPolicy }}
          workingDir: /app
          env:
            - name: DAEMON_PORT
              value: "9000"
            - name: WORKDIR
              value: "/app"
            # DAEMON_TOKEN is injected per-claim via SandboxClaim.spec.env.
          ports:
            - name: daemon
              containerPort: 9000
              protocol: TCP
            - name: dev
              containerPort: 3000
              protocol: TCP
          resources:
            {{- toYaml .Values.sandbox.kubernetes.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
{{- end }}
