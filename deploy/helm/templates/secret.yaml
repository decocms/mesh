{{- if not .Values.secret.secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart-deco-studio.fullname" . }}-secrets
  labels:
    {{- include "chart-deco-studio.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.secret.BETTER_AUTH_SECRET | quote }}
  ENCRYPTION_KEY: {{ .Values.secret.ENCRYPTION_KEY | default "" | quote }}
  {{- if eq (lower (default "sqlite" .Values.database.engine)) "postgresql" }}
  # DATABASE_URL goes in Secret when PostgreSQL (contains sensitive credentials)
  DATABASE_URL: {{ include "chart-deco-studio.databaseUrl" . | trim | quote }}
  {{- end }}
  {{- with .Values.secret.AUTH_GOOGLE_CLIENT_ID }}
  AUTH_GOOGLE_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.AUTH_GOOGLE_CLIENT_SECRET }}
  AUTH_GOOGLE_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.AUTH_GITHUB_CLIENT_ID }}
  AUTH_GITHUB_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.AUTH_GITHUB_CLIENT_SECRET }}
  AUTH_GITHUB_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.AUTH_RESEND_API_KEY }}
  AUTH_RESEND_API_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
