# Default values for chart-deco-studio.
# The value below is only considered if autoscaling is disabled.
replicaCount: 1

strategy:
  # type: ""  # Leave empty for auto-detection:
  #   - RollingUpdate: if database.engine=postgresql OR persistence.distributed=true OR accessMode=ReadWriteMany
  #   - Recreate: if SQLite with ReadWriteOnce (default)
  # rollingUpdate:
  #   maxSurge: 1
  #   maxUnavailable: 0

image:
  repository: ghcr.io/decocms/studio/studio
  pullPolicy: IfNotPresent
  command:
    - bun
    - run
    - deco
    - --no-local-mode
    - --num-threads
    - "4"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    memory: "2Gi"
    cpu: "2000m"
  limits:
    memory: "2Gi"

database:
  engine: sqlite # sqlite | postgresql
  url: ""        # Required when engine=postgresql
  caCert: ""     # Optional: Specify existing CA certificate in PEM format

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: "gp3"  # Empty string applies default storage class.
  size: 10Gi
  claimName: ""  # Optional: Specify existing PVC name
  distributed: false  # Mark as true if storage offers ReadWriteMany
  emptyDirSizeLimit: "10Gi"  # Cap for the emptyDir volume when persistence.enabled=false. Prevents a single pod from exhausting node ephemeral-storage.

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

configMap:
  meshConfig:
    NODE_ENV: "production"
    PORT: "3000"
    HOST: "0.0.0.0"
    BETTER_AUTH_URL: "http://localhost:8080"
    BASE_URL: "http://localhost:8080"
    DATA_DIR: "/app/data"
    # NATS_URL: ""  # Optional: overrides auto-derived URL when nats.enabled=true (e.g. nats://my-nats:4222)
    DATABASE_POOL_MAX: "20"
    DECO_AI_GATEWAY_ENABLED: "false"

secret:
  # secretName: ""  # If defined, uses this existing secret (does not create new secret)
  # Generate secret with the following command: openssl rand -base64 32
  BETTER_AUTH_SECRET: "define_your_secret_with_command_above"
  # ENCRYPTION_KEY for CredentialVault (AES-256-GCM).
  # Empty string "" is valid — derives key via SHA-256("").
  # If omitted, the server auto-generates a random key on each boot (breaks across restarts).
  # Generate with: openssl rand -base64 32
  ENCRYPTION_KEY: ""

volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

extraContainers: []
# - name: cloudsql-proxy
#   image: gcr.io/cloudsql-docker/gce-proxy:1.33.1
#   args:
#     - "/cloud_sql_proxy"
#     - "-instances=PROJECT:REGION:INSTANCE=tcp:5432"

volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

podSecurityContext:
  fsGroup: 1001
  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 4

terminationGracePeriodSeconds: 60

# Optional lifecycle hooks (preStop, postStart)
# lifecycle: {}

nodeSelector:
  kubernetes.io/arch: amd64
# arm64 clusters (Apple Silicon kind, ARM EKS, bare-metal RPi) should override
# this — set `nodeSelector: {}` or pin to `arm64`. Mesh's own image is
# multi-arch, but the s3-sync sidecar and some upstream subchart images may
# be amd64-only.

tolerations: []
# Example:
# tolerations:
#   - key: "env"
#     operator: "Equal"
#     value: "dev"
#     effect: "NoSchedule"

affinity: {}
# Example:
# affinity:
#   podAntiAffinity:
#     preferredDuringSchedulingIgnoredDuringExecution:
#       - weight: 100
#         podAffinityTerm:
#           labelSelector:
#             matchLabels:
#               app.kubernetes.io/name: chart-deco-studio
#           topologyKey: kubernetes.io/hostname

# Topology Spread Constraints (optional - leave empty [] to disable)
# IMPORTANT: labelSelector is required when topologySpreadConstraints is configured
#topologySpreadConstraints: []
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: chart-deco-studio
        app.kubernetes.io/instance: deco-studio

# OpenTelemetry configuration (optional)
otel:
  enabled: false
  protocol: "http/protobuf"  # http/protobuf | grpc
  service: ""                # OTEL_SERVICE_NAME
  endpoint: ""               # Remote OTLP endpoint (direct export, bypasses collector)
  # When otel.endpoint is set, the app sends directly to this endpoint
  # and headers are passed as OTEL_EXPORTER_OTLP_HEADERS.
  # When otel.endpoint is empty and otel.collector.enabled is true,
  # the app sends to the in-cluster collector which handles forwarding.
  # In that case, configure the remote endpoint in the collector config
  # (opentelemetry-collector.config.exporters) instead.
  headers: {}                # OTEL_EXPORTER_OTLP_HEADERS (key=value format)
  # headers:
  #   authorization: "Bearer your-token"
  #   x-custom-header: "value"
  attributes: {}             # OTEL_RESOURCE_ATTRIBUTES (key=value format)
  # attributes:
  #   deployment.environment: "production"
  #   service.namespace: "my-namespace"

  # Shared OTel Collector (namespace-level Deployment via subchart)
  # When enabled, app exports to http://<release>-opentelemetry-collector:4318
  # unless overridden via otel.endpoint
  collector:
    enabled: false

# S3 file sync sidecar — syncs /app/data/{logs,traces,metrics} to S3
# Uses inotify + curl (AWS SigV4) for event-driven upload with minimal memory
s3Sync:
  enabled: false
  image:
    repository: ghcr.io/decocms/studio/s3-sync
    tag: "3.0.0"
    pullPolicy: IfNotPresent
  bucket: ""               # Required when enabled
  region: "us-east-1"
  prefix: ""               # S3 key prefix (e.g. "studio/production")
  interval: 60             # Safety-net poll interval in seconds
  roleArn: ""              # IRSA role ARN — adds eks.amazonaws.com/role-arn to ServiceAccount
  syncDirs:                # Directories under /app/data to sync
    - logs
    - traces
    - metrics
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "32Mi"

# NATS subchart (https://artifacthub.io/packages/helm/nats/nats)
# When enabled, NATS_URL is automatically set to nats://<release-name>-nats:4222
# unless overridden via configMap.meshConfig.NATS_URL
nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      memoryStore:
        enabled: true
        maxSize: 1Gi
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 10Gi
          storageClassName: ""  # empty = use cluster default StorageClass

# Additional environment variables (merged with existing envs)
env: []
# env:
#   - name: MY_CUSTOM_VAR
#     value: "my-value"
#   - name: MY_SECRET_VAR
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: my-key

# OpenTelemetry Collector subchart configuration
# See: https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-collector
# NOTE: mode is required (the chart has no default). Helm lists are NOT merged —
# if you override config.service.pipelines, you must specify all pipelines.
# To scale: set opentelemetry-collector.replicaCount or configure autoscaling.
opentelemetry-collector:
  mode: deployment
  image:
    repository: otel/opentelemetry-collector-contrib
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "1Gi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    behavior: {}
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    additionalMetrics: []
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 25
      batch:
        send_batch_size: 1024
        send_batch_max_size: 2048
        timeout: 5s
    exporters:
      debug:
        verbosity: basic
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]

# Agent-sandbox runner. Requires STUDIO_SANDBOX_RUNNER=agent-sandbox in mesh env.
# Disabled by default — self-hosters on the Docker runner (simpler, no
# cluster needed) leave this off and don't pay the agent-sandbox operator
# install cost.
#
# When enabled, installs:
#   - agent-sandbox operator + CRDs (vendored in charts/agent-sandbox/)
#   - SandboxTemplate used by every SandboxClaim mesh creates
#   - NetworkPolicy locking down sandbox-pod ingress/egress
#   - (optional) SandboxWarmPool for cold-start mitigation
#
# See deploy/helm/README.md for the enable/upgrade procedure.
sandbox:
  agentSandbox:
    enabled: false
    image:
      repository: ghcr.io/decocms/mesh-sandbox
      tag: latest
      # Default IfNotPresent; override to Never for local kind clusters that
      # load the image via `kind load docker-image`.
      pullPolicy: IfNotPresent
    # Prod ceilings. Adjust per measured workload.
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
        ephemeral-storage: 10Gi
    networkPolicy:
      enabled: true
      # Legacy/standby — kept for setups whose external gateway terminates
      # *directly* on the sandbox's port 3000 (dev server). The default
      # preview path goes through mesh and lands on port 9000 (daemon)
      # instead, so most installs leave this empty. See
      # `previewGateway` below for the standard Istio Gateway API path.
      previewGatewayNamespace: ""
    # Public URL pattern that ingress terminates on for sandbox previews.
    # The runner substitutes {handle} (or whatever applyPreviewPattern
    # supports) with the per-claim handle. Set in prod once a wildcard
    # gateway + cert is in place; leave empty in local dev so the runner
    # falls back to the 127.0.0.1 port-forward URL. Surfaced into the
    # mesh container as STUDIO_SANDBOX_PREVIEW_URL_PATTERN.
    #
    # Should match `previewGateway.domain` below — e.g. when
    # previewGateway.domain="preview.decocms.com", set this to
    # "https://{handle}.preview.decocms.com".
    previewUrlPattern: ""
    # previewUrlPattern: "https://{handle}.preview.example.com"
    # Wildcard preview-URL ingress (Approach B in the K8s sandbox plan).
    # Renders an Istio Gateway + HTTPRoute that send all
    # *.preview.<domain> traffic to the mesh Service; mesh recognises the
    # Host header and reverse-proxies to the matching sandbox's daemon at
    # port 9000 (daemon, not dev port 3000 — the daemon's reverse proxy
    # injects the HMR bootstrap + strips CSP that the iframe needs).
    #
    # Manual prerequisites (not templated):
    #   1. DNS: Cloudflare (or other) wildcard `*.preview.<domain>` →
    #      cluster external LB hostname.
    #   2. cert-manager ClusterIssuer for the wildcard cert. DNS-01 is
    #      required (HTTP-01 doesn't work for wildcards). Set
    #      `clusterIssuer` to that issuer's name.
    previewGateway:
      enabled: false
      # gatewayClassName for the Gateway. EKS clusters running Istio
      # ambient/sidecar default to "istio". Confirm with
      # `kubectl get gatewayclasses` before flipping enabled=true.
      gatewayClassName: "istio"
      # Namespace where the Gateway + HTTPRoute land. Mesh's existing
      # gateway typically lives in `istio-system`; some setups use a
      # dedicated `gateway` ns. The cert Secret is created in the same ns.
      namespace: "istio-system"
      # Wildcard domain for previews — e.g. "preview.decocms.com" yields
      # `*.preview.decocms.com`. Required when enabled=true.
      domain: ""
      # cert-manager ClusterIssuer that issues the wildcard cert. Required
      # when enabled=true. The chart does NOT template the ClusterIssuer
      # itself — that is per-cluster infrastructure (a Cloudflare DNS-01
      # issuer, for example, needs your API token in a Secret).
      clusterIssuer: ""
      # PEM-format secret name created by cert-manager. Defaults to
      # `<release>-sandbox-preview-tls`. Override only if the cert lives
      # under a name dictated by external tooling.
      tlsSecretName: ""
    # Pin sandbox pods to a dedicated NodePool so a container escape lands
    # on a node that has no mesh / postgres / NATS / OTel pods on it. Pair
    # with a Karpenter NodePool that taints + labels matching nodes; see
    # deploy/helm/README.md for the snippet. Empty defaults run sandbox
    # pods on whatever the scheduler picks (current behavior).
    nodeSelector: {}
    # nodeSelector:
    #   workload: sandbox
    tolerations: []
    # tolerations:
    #   - key: workload
    #     operator: Equal
    #     value: sandbox
    #     effect: NoSchedule
    # Affinity rules merged into the sandbox PodSpec. Use podAffinity to
    # co-locate sandbox pods on the same node (cheaper warm-pool packing,
    # shared image cache); use nodeAffinity for soft node preferences that
    # nodeSelector can't express. Empty default = scheduler picks.
    affinity: {}
    # affinity:
    #   podAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #       - weight: 100
    #         podAffinityTerm:
    #           labelSelector:
    #             matchLabels:
    #               app.kubernetes.io/name: studio-sandbox
    #           topologyKey: kubernetes.io/hostname
    # User namespace remap (`spec.hostUsers: false`): UID 1000 inside the
    # pod maps to a high, unprivileged subordinate UID on the node, so a
    # container escape doesn't land as a real node UID. Requires K8s
    # 1.30+ with a containerd/kernel that support userns (EKS default
    # AMIs from late 2024 onward are fine). Defaults to current behavior
    # (host users); flip to false to opt in.
    hostUsers: true
    # Read-only root filesystem. When true, /app + /tmp + /home/sandbox
    # are remounted as emptyDirs and `safe.directory '*'` is set so git
    # works against the chowned mount. Validate end-to-end (clone +
    # bun/npm install + dev server start) on staging before flipping; the
    # daemon may write to paths we haven't covered. Defaults to false to
    # preserve current behavior on upgrade.
    readOnlyRootFilesystem: false
    warmPool:
      # Enable only after measuring cold-start pain; every warm pod costs
      # the full resources.requests above.
      enabled: false
      size: 0
