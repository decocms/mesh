# Default values for chart-deco-studio.
# The value below is only considered if autoscaling is disabled.
replicaCount: 1

strategy:
  # type: ""  # Leave empty for auto-detection:
  #   - RollingUpdate: if database.engine=postgresql OR persistence.distributed=true OR accessMode=ReadWriteMany
  #   - Recreate: if SQLite with ReadWriteOnce (default)
  # rollingUpdate:
  #   maxSurge: 1
  #   maxUnavailable: 0

image:
  repository: ghcr.io/decocms/studio/studio
  pullPolicy: IfNotPresent
  command:
    - bun
    - run
    - deco
    - --no-local-mode
    - --num-threads
    - "4"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    memory: "2Gi"
    cpu: "2000m"
  limits:
    memory: "2Gi"

database:
  engine: sqlite # sqlite | postgresql
  url: ""        # Required when engine=postgresql
  caCert: ""     # Optional: Specify existing CA certificate in PEM format

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: "gp3"  # Empty string applies default storage class.
  size: 10Gi
  claimName: ""  # Optional: Specify existing PVC name
  distributed: false  # Mark as true if storage offers ReadWriteMany

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

configMap:
  meshConfig:
    NODE_ENV: "production"
    PORT: "3000"
    HOST: "0.0.0.0"
    BETTER_AUTH_URL: "http://localhost:8080"
    BASE_URL: "http://localhost:8080"
    DATA_DIR: "/app/data"
    # NATS_URL: ""  # Optional: overrides auto-derived URL when nats.enabled=true (e.g. nats://my-nats:4222)
    DATABASE_POOL_MAX: "20"
    DECO_AI_GATEWAY_ENABLED: "false"

secret:
  # secretName: ""  # If defined, uses this existing secret (does not create new secret)
  # Generate secret with the following command: openssl rand -base64 32
  BETTER_AUTH_SECRET: "define_your_secret_with_command_above"
  # ENCRYPTION_KEY for CredentialVault (AES-256-GCM).
  # Empty string "" is valid — derives key via SHA-256("").
  # If omitted, the server auto-generates a random key on each boot (breaks across restarts).
  # Generate with: openssl rand -base64 32
  ENCRYPTION_KEY: ""

volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

extraContainers: []
# - name: cloudsql-proxy
#   image: gcr.io/cloudsql-docker/gce-proxy:1.33.1
#   args:
#     - "/cloud_sql_proxy"
#     - "-instances=PROJECT:REGION:INSTANCE=tcp:5432"

volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

podSecurityContext:
  fsGroup: 1001
  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 4

terminationGracePeriodSeconds: 60

# Optional lifecycle hooks (preStop, postStart)
# lifecycle: {}

nodeSelector:
  kubernetes.io/arch: amd64

tolerations: []
# Example:
# tolerations:
#   - key: "env"
#     operator: "Equal"
#     value: "dev"
#     effect: "NoSchedule"

affinity: {}
# Example:
# affinity:
#   podAntiAffinity:
#     preferredDuringSchedulingIgnoredDuringExecution:
#       - weight: 100
#         podAffinityTerm:
#           labelSelector:
#             matchLabels:
#               app.kubernetes.io/name: chart-deco-studio
#           topologyKey: kubernetes.io/hostname

# Topology Spread Constraints (optional - leave empty [] to disable)
# IMPORTANT: labelSelector is required when topologySpreadConstraints is configured
#topologySpreadConstraints: []
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: chart-deco-studio
        app.kubernetes.io/instance: deco-studio

# OpenTelemetry configuration (optional)
otel:
  enabled: false
  protocol: "http/protobuf"  # http/protobuf | grpc
  service: ""                # OTEL_SERVICE_NAME
  endpoint: ""               # Remote OTLP endpoint (direct export, bypasses collector)
  headers: {}                # OTEL_EXPORTER_OTLP_HEADERS (key=value format)
  # headers:
  #   authorization: "Bearer your-token"
  #   x-custom-header: "value"
  attributes: {}             # OTEL_RESOURCE_ATTRIBUTES (key=value format)
  # attributes:
  #   deployment.environment: "production"
  #   service.namespace: "my-namespace"

  # Shared OTel Collector (namespace-level Deployment via subchart)
  # When enabled, app exports to http://<release>-opentelemetry-collector:4318
  # unless overridden via otel.endpoint
  collector:
    enabled: false

# S3 file sync sidecar — syncs /app/data/{logs,traces,metrics} to S3
# Uses s5cmd (Go) for fast, lightweight S3 sync with minimal resources
s3Sync:
  enabled: false
  image:
    repository: ghcr.io/decocms/studio/s3-sync
    tag: "2.3.0"
    pullPolicy: IfNotPresent
  bucket: ""               # Required when enabled
  region: "us-east-1"
  prefix: ""               # S3 key prefix (e.g. "studio/production")
  interval: 30             # Polling interval in seconds
  roleArn: ""              # IRSA role ARN — adds eks.amazonaws.com/role-arn to ServiceAccount
  syncDirs:                # Directories under /app/data to sync
    - logs
    - traces
    - metrics
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "256Mi"

# NATS subchart (https://artifacthub.io/packages/helm/nats/nats)
# When enabled, NATS_URL is automatically set to nats://<release-name>-nats:4222
# unless overridden via configMap.meshConfig.NATS_URL
nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      memoryStore:
        enabled: true
        maxSize: 1Gi
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 10Gi
          storageClassName: ""  # empty = use cluster default StorageClass

# Additional environment variables (merged with existing envs)
env: []
# env:
#   - name: MY_CUSTOM_VAR
#     value: "my-value"
#   - name: MY_SECRET_VAR
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: my-key

# OpenTelemetry Collector subchart configuration
# See: https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-collector
# NOTE: mode is required (the chart has no default). Helm lists are NOT merged —
# if you override config.service.pipelines, you must specify all pipelines.
# To scale: set opentelemetry-collector.replicaCount or configure autoscaling.
opentelemetry-collector:
  mode: deployment
  image:
    repository: otel/opentelemetry-collector-contrib
  podSecurityContext:
    fsGroup: 1001
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "1Gi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    behavior: {}
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    additionalMetrics: []
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 25
      batch:
        send_batch_size: 1024
        send_batch_max_size: 2048
        timeout: 5s
    exporters:
      debug:
        verbosity: basic
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
