# kube-prometheus-stack values for the mesh sandbox monitoring stack.
#
# Used by both local kind (`deploy/k8s-sandbox/local/up.sh`) and prod
# installs. Local layers a kind-only overlay on top — see
# `local/monitoring/values-kube-prometheus-stack.local.yaml`.
#
# Scope: Prometheus + Grafana + the prometheus-operator (so ServiceMonitor
# / PodMonitor CRs work). Disabled the parts we don't need for sandbox
# cost-attribution dashboards:
#   - alertmanager: nothing to alert on yet
#   - node-exporter: per-node OS metrics aren't on the customer bill
#   - kube-state-metrics: the OTel collector pipeline already enriches with
#     pod labels, so we don't need KSM's parallel `kube_pod_labels` series.
#     Re-enable later if you want pod-state info we can't get from kubeletstats.

grafana:
  # Prod must override `adminPassword` (or set `admin.existingSecret`) and
  # typically wires SSO via grafana.ini. Local sets a plaintext password
  # in its overlay.
  defaultDashboardsTimezone: browser
  service:
    type: ClusterIP
  # Sidecar watches for ConfigMaps with `grafana_dashboard=1` and auto-imports
  # them as dashboards. up.sh creates one for sandbox-overview.json; prod can
  # apply the same ConfigMap (or commit it as a manifest).
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
  # Datasource is auto-wired to the bundled Prometheus.

prometheus:
  prometheusSpec:
    # Pick up ServiceMonitors / PodMonitors created by other charts (the OTel
    # collector chart in particular) regardless of helm-managed labels.
    # Without these, the operator only matches its own release's monitors
    # and our collector's monitor is invisible.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    # Modest defaults: prod typically replaces these with `remoteWrite` to
    # Mimir/VictoriaMetrics and bumps `retention` + `resources`. See
    # `monitoring/README.md` for prod overlay examples.
    retention: 7d
    resources:
      requests:
        memory: "400Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"

alertmanager:
  enabled: false

# camelCase: kube-prometheus-stack's own toggles for the bundled subcharts.
# (The dashed-name forms `nodeExporter:` and `kube-state-metrics:` would be
# subchart values, not the parent toggle — silently ignored.)
nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false

# Trim default dashboards/rules — we only care about sandbox-overview here.
defaultRules:
  create: false
